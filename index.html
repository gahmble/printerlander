<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Costco Rewards</title>
  
  <!-- Updated Favicon File Name -->
  <link rel="icon" type="image/png" href="assets/8dd0e5c4-c0d5-4533-bb55-1bcf0b606747.png" />
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4f7f9;
      color: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }

    .brand-logo-container {
      margin-top: 10px;
      margin-bottom: 30px;
      text-align: center;
    }

    .brand-logo {
      width: 100%;
      max-width: 220px;
      height: auto;
      display: block;
    }

    .headline {
      font-size: 1.45rem;
      font-weight: 700;
      text-align: center;
      max-width: 380px;
      line-height: 1.35;
      margin-bottom: 30px;
      color: #000000;
    }

    .btn-get {
      display: inline-block;
      background: #0056b3; 
      color: #fff;
      text-decoration: none;
      padding: 16px 50px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 40px;
      box-shadow: 0 4px 12px rgba(0, 86, 179, 0.2);
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .btn-get:hover {
      transform: scale(1.02);
      background: #004494;
    }

    .instruction-card {
      background: #ffffff;
      width: 100%;
      max-width: 400px;
      padding: 35px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    .instruction-card h2 {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 700;
      color: #000000;
      margin-bottom: 30px;
    }

    .step-item {
      display: flex;
      align-items: center;
      margin-bottom: 25px;
    }

    .step-item:last-child {
      margin-bottom: 0;
    }

    .circle-num {
      width: 36px;
      height: 36px;
      background: #144586; 
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.95rem;
      margin-right: 18px;
      flex-shrink: 0;
    }

    .step-desc {
      font-size: 0.95rem;
      font-weight: 500;
      color: #1a2b4c;
    }
  </style>
</head>
<body>

  <div class="brand-logo-container">
    <!-- Updated Main Costco Logo File Name -->
    <img src="assets/0e8cad7c-b75d-4f32-94e2-37ef1af4a9bf.png" alt="Costco Wholesale" class="brand-logo">
  </div>

  <h1 class="headline">Get a $750 Costco Gift Card for doing their survey!</h1>

  <a href="https://giftclick.org/aff_c?offer_id=1323&aff_id=13221" class="btn-get">Get Now</a>

  <div class="instruction-card">
    <h2>How to Start</h2>
    
    <div class="step-item">
      <div class="circle-num">1</div>
      <div class="step-desc">Complete a quick survey</div>
    </div>

    <div class="step-item">
      <div class="circle-num">2</div>
      <div class="step-desc">Enter your basic info</div>
    </div>

    <div class="step-item">
      <div class="circle-num">3</div>
      <div class="step-desc">Complete recommended deals</div>
    </div>

    <div class="step-item">
      <div class="circle-num">4</div>
      <div class="step-desc">Check your email for the checkout code</div>
    </div>
  </div>

</body>
</html>
